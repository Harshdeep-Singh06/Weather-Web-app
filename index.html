<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Weather</title>
    <script src = "https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">   
</head>
<body class = "h-screen flex flex-col bg-gradient-to-br from-sky-100 via-blue-400 to-blue-600">
    <nav class = "bg-white/10 backdrop-blur-md border-b border-white/20 shadow-lg">
        <div class = "max-w-7xl mx-auto px-4">
            <div class = "flex justify-center items-center h-16">
                <h1 class = "text-2xl font-serif text-white tracking-wide">
                    Weather Check
                </h1>
            </div>
        </div>
    </nav>
    <div class = "max-w-7xl mx-auto mt-16 ">
      <div class = "flex justify-center items-center h-full">
        <input type="text" placeholder = "Search your City..." spellcheck ="false" class="w-52 sm:w-80 px-6 py-1 sm:py-2 bg-white/20 text-white placeholder-white/70 rounded-3xl focus:outline-none backdrop-blur-sm ">
        <button class = "px-4 py-1 sm:py-2 ml-2 bg-white/20 text-white rounded-3xl hover:bg-white/30 transition backdrop-blur-sm">
            <i class="fas fa-search"></i>
         </button>
       </div>  
    </div>
    <section class="flex justify-center mt-16">
         <div class=" bg-white/20 p-8 rounded-2xl shadow-2xl w-full max-w-md backdrop-blur-sm">
            <div class = "  flex flex-col items-center">
               <img src = "images/rain.png" class = " w-24 mb-4">
                <h1 class = "temp-value text-5xl font-bold text-white/80 ">22°c</h1>
                <h2 class = "city-value text-white/80 text-xl mt-2 mb-6 tracking-wide">New York</h2>
                <div class = "flex justify-between w-full mt-4">
                    <div class = "flex items-center gap-3">
                        <img src = "images/humidity.png" class="w-8">
                        <div>
                            <p class = "humidity-value text-lg font-semibold text-white/80">50%</p>
                            <p class ="text-sm text-white/80">Humidity</p>
                        </div>
                    </div>

                    <div class = "flex items-center gap-3">
                        <img src = "images/wind.png" class="w-8">
                        <div>
                            <p class = "wind-value text-white/80 text-lg font-semibold">15 km/h</p>
                            <p class = "text-sm text-white/80">Wind Speed</p>
                        </div>
                    </div>
                </div>
            </div>
         </div>
    </section>

<script src="script.js"></script>
</body>
</html>
